# pubspec.yaml (corregido)
name: outfi_maker_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # Imagenes y escaneo
  image_picker: ^1.0.7
  mobile_scanner: ^7.2.0

  # HTTP y estado
  http: ^1.2.0
  provider: ^6.1.2

  # Geolocalización
  geolocator: ^14.0.2

  # Utilidades para rutas de archivos
  path: ^1.9.0
  path_provider: ^2.1.1

  # Almacenamiento local
  shared_preferences: ^2.2.2

  # Calendario
  table_calendar: ^3.0.9

  # Iconos de iOS
  cupertino_icons: ^1.0.8

  # Google ML Kit (versiones compatibles)
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_selfie_segmentation: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
